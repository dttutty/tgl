sampling:
  - no_sample: True
    history: 1
memory: 
  - type: 'node'
    dim_time: 128
    deliver_to: 'self'
    mail_combine: 'last'
    memory_update: 'rnn'
    mailbox_size: 1
    combine_node_feature: True
    dim_out: 128
gnn:
  - arch: 'identity'
    time_transform: 'JODIE'
train:
  - epoch: 10
    batch_size: 2000
    lr: 0.0001
    dropout: 0.1